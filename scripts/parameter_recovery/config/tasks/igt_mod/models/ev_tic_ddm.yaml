name: "ev_tic_ddm"
description: "Expected Value Model with Trial-Independent Consistency and DDM"
task: "igt_mod"
response_type: "choice_rt"

parameters:
  boundary:
    range: [0, inf]
    transform: "exp"
    prior: "normal(0, 1)"
    
  tau:
    range: [RTbound, minRT]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
    
  beta:
    range: [0, 1]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
    
  drift_con:
    range: [0, 5]  # Changed range for TIC
    transform: "none"
    prior: "normal(1, 1)"
  
  wgt_pun:
    range: [0, 1]
    transform: "none"
    prior: "normal(0.5, 0.25)"
  
  wgt_rew:
    range: [0, 1]
    transform: "none"
    prior: "normal(0.5, 0.25)"

  update:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"