name: "dualp_bbup"
description: "Dual Process Model with Bayesian Belief Updating"
task: "igt_mod"
response_type: "choice"

parameters:
  update_rate_mf:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
  
  decay_factor:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
  
  pos_val:
    range: [0, 10]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
  
  neg_val:
    range: [0, 10]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
  
  var_pe_update:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
  
  update_weight_mb:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"

  consistency:
    range: [0, 5]
    transform: "logistic"
    prior: "normal(1, 1)"