name: "pvlbothsd_ddm"
description: "Prospect Valence Learning Model with Delta Update and Selective Decay and DDM Model"
task: "igt_mod"
response_type: "choice_rt"

parameters:
  boundary:
    range: [0, inf]
    transform: "exp"
    prior: "normal(0, 1)"
    
  tau:
    range: [RTbound, minRT]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
    
  beta:
    range: [0, 1]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
    
  drift_con:
    range: [-5, 5]
    transform: "none"
    prior: "normal(1, 1)"

  gain:
    range: [0, 2]
    transform: "none"
    prior: "normal(1, 0.5)"
  
  loss:
    range: [0, 10]
    transform: "none"
    prior: "normal(1, 1)"

  update:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"

  decay:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"