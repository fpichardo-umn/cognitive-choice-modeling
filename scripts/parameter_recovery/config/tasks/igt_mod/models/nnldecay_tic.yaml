name: "nnldecay_tic"
description: "Neural Network Learning Model with Decay and Trial-Independent Consistency"
task: "igt_mod"
response_type: "choice"

parameters:
  gain:
    range: [0, 2]
    transform: "none"
    prior: "normal(1, 0.5)"
  
  loss:
    range: [0, 2]
    transform: "none"
    prior: "normal(1, 0.5)"
  
  con:
    range: [0, 5]  # Changed range for TIC
    transform: "none"
    prior: "normal(1, 1)"

  decay:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"