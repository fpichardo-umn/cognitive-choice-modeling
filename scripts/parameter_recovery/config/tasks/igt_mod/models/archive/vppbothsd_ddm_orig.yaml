name: "pvlbothsd_ddm"
description: "Prospect Valence Learning Model with Delta Update and Selective Decay and DDM Model"
task: "igt_mod"
response_type: "choice_rt"

parameters:
  boundary:
    range: [0, inf]
    transform: "exp"
    prior: "normal(0, 1)"
    
  tau:
    range: [RTbound, minRT]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
    
  beta:
    range: [0, 1]
    categories:
      low: [0, 0.3]
      medium: [0.3, 0.7]
      high: [0.7, 1]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
    
  drift_con:
    range: [-2, 2]
    categories:
      low: [-2, -1]
      medium: [-1, 1]
      high: [1, 2]
    transform: "logistic_scale"
    prior: "normal(0, 1)"

  gain:
    range: [0, 1]
    categories:
      low: [0, 0.5]
      medium: [0.5, 1.5]
      high: [1.5, 2]
    transform: "logistic"
    prior: "normal(1, 0.5)"
  
  loss:
    range: [0, 1]
    categories:
      low: [0, 1.5]
      medium: [1.5, 3.5]
      high: [3.5, 5]
    transform: "logistic"
    prior: "normal(1, 1)"
  
  update:
    range: [0, 1]
    categories:
      low: [0, 0.3]
      medium: [0.3, 0.7]
      high: [0.7, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
  
  decay:
    range: [0, 1]
    categories:
      low: [0, 0.3]
      medium: [0.3, 0.7]
      high: [0.7, 1]
    transform: "logistic"
    prior: "normal(0, 1)"

  k:
    range: [0, 1]
    categories:
      low: [0, 0.3]
      medium: [0.3, 0.7]
      high: [0.7, 1]
    transform: "logistic"
    prior: "normal(0, 1)"

  ep:
    range:  [0, inf]
    transform: ""
    prior: "normal(0, 1)"