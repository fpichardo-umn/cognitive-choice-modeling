name: "ddm"
description: "DDM Model"
task: "igt_mod"
response_type: "choice_rt"

parameters:
  boundary:
    range: [0, inf]
    transform: "exp"
    prior: "normal(0, 1)"
    
  tau:
    range: [RTbound, minRT]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
    
  beta:
    range: [0, 1]
    categories:
      low: [0, 0.3]
      medium: [0.3, 0.7]
      high: [0.7, 1]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
    
  drift:
    range: [-3, 3]
    categories:
      low: [-3, -1.666]
      medium: [-1.666, 1.333]
      high: [1.333, 3]
    transform: ""
    prior: "normal(0, 1)"
