name: "dualp_bbup_ddm_b1p2"
description: "Dual Process Model with Bayesian Belief Updating and DDM with Block-Specific Parameters"
task: "igt_mod"
response_type: "choice_rt"

parameters:
  # Cognitive parameters
  update_rate_mf:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
  
  decay_factor:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
  
  pos_val:
    range: [0, 10]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
  
  neg_val:
    range: [0, 10]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
  
  var_pe_update:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
  
  update_weight_mb:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
  
  # DDM parameters
  boundary1:
    range: [0, inf]
    transform: "exp"
    prior: "normal(0, 1)"
    
  boundary:
    range: [0, inf]
    transform: "exp"
    prior: "normal(0, 1)"
    
  tau1:
    range: [RTbound, minRT]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
    
  tau:
    range: [RTbound, minRT]
    transform: "logistic_scale"
    prior: "normal(0, 1)"
    
  beta:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
    
  drift_con:
    range: [-5, 5]
    transform: "none"
    prior: "normal(0, 1)"