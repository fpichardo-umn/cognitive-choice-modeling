name: "pulboth_ddm_b1p2"
description: "Prospect Utility Learning Both Model with DDM, Block 1 Boundary and Tau"
task: "igt_mod"
response_type: "choice_rt"

parameters:
  boundary1:
    range: [0, Inf]
    transform: "exp"
    prior: "normal(0, 1)"
    
  boundary:
    range: [0, Inf]
    transform: "exp"
    prior: "normal(0, 1)"
    
  tau1:
    range: [0.1, 0.9]
    transform: "none"
    prior: "normal(0, 1)"
    
  tau:
    range: [0.1, 0.9]
    transform: "none"
    prior: "normal(0, 1)"
    
  beta:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
    
  drift_con:
    range: [-5, 5]
    transform: "none"
    prior: "normal(1, 1)"
  
  gain:
    range: [0, 10]
    transform: "none"
    prior: "normal(1, 0.5)"
  
  loss:
    range: [0, 10]
    transform: "none"
    prior: "normal(1, 1)"
    
  mag:
    range: [0, 2]
    transform: "none"
    prior: "normal(1, 0.5)"
    
  update:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"
    
  decay:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"