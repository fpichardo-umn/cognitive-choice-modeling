name: "pvldecay"
description: "Prospect Valence Learning Model with Decay RL"
task: "igt_mod"
response_type: "choice"

parameters:
  gain:
    range: [0, 1]
    categories:
      low: [0, 0.5]
      medium: [0.5, 1.5]
      high: [1.5, 2]
    transform: "none"
    prior: "normal(1, 0.5)"
  
  loss:
    range: [0, 1]
    categories:
      low: [0, 1.5]
      medium: [1.5, 3.5]
      high: [3.5, 5]
    transform: "none"
    prior: "normal(1, 1)"
  
  con:
    range: [-2, 2]
    categories:
      low: [0, 1.5]
      medium: [1.5, 3.5]
      high: [3.5, 5]
    transform: "none"
    prior: "normal(1, 1)"
  
  retend:
    range: [0, 1]
    categories:
      low: [0, 0.3]
      medium: [0.3, 0.7]
      high: [0.7, 1]
    transform: "logistic"
    prior: "normal(0, 1)"

  k:
    range: [0, 1]
    categories:
      low: [0, 0.3]
      medium: [0.3, 0.7]
      high: [0.7, 1]
    transform: "logistic"
    prior: "normal(0, 1)"

  ep:
    range:  [0, inf]
    transform: ""
    prior: "normal(0, 1)"
