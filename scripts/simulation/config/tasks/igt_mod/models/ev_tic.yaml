name: "ev_tic"
description: "Expected Value Model with Trial-Independent Consistency"
task: "igt_mod"
response_type: "choice"

parameters:
  wgt_pun:
    range: [0, 1]
    transform: "none"
    prior: "normal(0.5, 0.25)"
  
  wgt_rew:
    range: [0, 1]
    transform: "none"
    prior: "normal(0.5, 0.25)"
  
  con:
    range: [0, 5]  # Changed range for TIC
    transform: "none"
    prior: "normal(1, 1)"

  update:
    range: [0, 1]
    transform: "logistic"
    prior: "normal(0, 1)"